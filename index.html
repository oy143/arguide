<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>智影校园 AR 导览</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            overflow: hidden; background: #000; touch-action: none;
        }
        #hint {
            position: absolute; top: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: #fff;
            padding: 12px 24px; border-radius: 30px;
            font-size: 16px; z-index: 10; pointer-events: none;
            transition: all 0.4s;
        }
        #hint.found { background: rgba(76,175,80,0.85); animation: pulse 0.5s ease; }
        @keyframes pulse {
            0%,100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.08); }
        }
        #miniMap {
            position: absolute; bottom: 20px; right: 10px; width: 120px;
            background: rgba(0,0,0,0.75); border-radius: 16px; padding: 8px;
            z-index: 20; cursor: pointer; transition: all 0.3s;
        }
        #miniMap img { width: 100%; border-radius: 8px; }
        #fullMap {
            display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); z-index: 100;
            justify-content: center; align-items: center; flex-direction: column;
        }
        #fullMap img { max-width: 90%; max-height: 80%; border-radius: 16px; }
        #audioControls {
            position: absolute; bottom: 150px; left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            display: none;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 20px;
            max-width: 100%;
        }
        .audioBtn {
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.4);
            color: #fff;
            padding: 10px 16px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .audioBtn:hover, .audioBtn:active {
            background: rgba(76,175,80,0.7);
            border-color: rgba(255,255,255,0.8);
            transform: scale(1.05);
        }
        .audioBtn.playing {
            background: rgba(255,87,34,0.7);
        }
        .audioBtn.speaking {
            background: rgba(76,175,80,0.65);
        }

        .particles-layer {
            position: absolute;
            top: -10%;
            left: -10%;
            right: -10%;
            bottom: -10%;
            pointer-events: none;
            overflow: visible;
            z-index: 10;
        }
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255,255,255,0.9), 0 0 16px rgba(255,255,255,0.5);
        }
        .particle.orbit {
            animation: orbit 4s infinite linear;
        }
        .particle.float-border {
            animation: floatBorder 3s infinite ease-in-out;
        }
        .particle.twinkle-edge {
            animation: twinkleEdge 2s infinite ease-in-out;
        }
        .particle.pulse-glow {
            animation: pulseGlow 2.5s infinite ease-in-out;
        }
        @keyframes orbit {
            0% { transform: rotate(0deg) translateX(120px) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: rotate(360deg) translateX(120px) rotate(-360deg); opacity: 0; }
        }
        @keyframes floatBorder {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.6; }
            25% { transform: translateY(-10px) translateX(5px); opacity: 1; }
            50% { transform: translateY(0) translateX(-5px); opacity: 0.8; }
            75% { transform: translateY(10px) translateX(5px); opacity: 1; }
        }
        @keyframes twinkleEdge {
            0%, 100% { opacity: 0.2; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.3); }
        }
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.3; box-shadow: 0 0 4px rgba(255,255,255,0.5); }
            50% { opacity: 1; box-shadow: 0 0 12px rgba(255,255,255,0.9), 0 0 24px rgba(255,255,255,0.6); }
        }
    </style>
</head>
<body>

        <img src="./assets/campus-map.png" alt="校园地图" onerror="this.style.display='none'; this.parentElement.querySelector('div').textContent='🗺️ 地图（待添加）'">

        <img src="./assets/campus-map.png" alt="校园地图" onerror="this.style.display='none'">
        <div style="color:#fff; font-size:14px; background:rgba(0,0,0,0.6); padding:8px 20px; border-radius:20px; margin-top:10px;">点击任意处关闭</div>
    </div>

    <div id="audioControls"></div>

    <script src="./vendor/aframe-1.5.0.min.js"></script>
    <script src="./vendor/mindar-image-aframe-1.2.5.prod.js"></script>

    <script>
        const spots = [
            {

            {

            },
            {
                title: "📚奖杯展",

                description: "这里陈列着VEX与WSC赛事中的各类奖杯，每一座奖杯都记录着团队协作、创新实践与不断挑战的精彩瞬间。奖杯展不仅是展示成果的空间，也是激励同学们勇于探索、追求卓越的校园文化窗口。",

                funFact: "💡 机器人的每一次移动，都可能凝聚着团队反复测试和改进的小发现",

            {

                emoji: "🍜",
                description: "走进4号教室，这里是连接创意与实践的科技空间。教室内设有零件存储区域，为项目制作提供整齐有序的材料支持；同时也是编程项目的探索场所。",
                funFact: "💡 看似普通的小零件，经过巧妙组合，也可能成为一个充满智慧的科技作品！",
                audioFile: "./audio/spot5.mp3",

            },
            {
                title: "🍽️ 1号教室",
                emoji: "🍜",
                description: "欢迎来到1号教室，这里是孩子们学习与成长的温馨空间。教室为学生提供日常课堂学习的场所，在这里，孩子们通过互动交流、动手实践和知识探索，开启一段段充满想象力的学习旅程。",
                funFact: "💡 每一张课桌前，都可能坐着一位正在发现新兴趣的小小探索者！",
                audioFile: "./audio/spot6.mp3",
                color: "#F44336",
                nextSpot: 0,
                nextSpotName: "科特学院入口",
                nextSpotDirection: "🚶"
            }
        ];


        let currentAudio = null;
        let foundSpots = new Set();

        function speakSpot(spotIndex) {
            const spot = spots[spotIndex];
            if (!spot || !('speechSynthesis' in window)) return false;
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(spot.title + '。' + spot.description);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.9;
            speechSynthesis.speak(utterance);
            return true;
        }

        function updateAudioBtn(spotIndex, status) {
            const btn = document.getElementById('audioBtn' + spotIndex);
            if (!btn) return;
            btn.className = 'audioBtn ' + status;
            const spot = spots[spotIndex];
            if (status === 'playing') {
                btn.textContent = '⏸️ 暂停';
            } else if (status === 'speaking') {
                btn.textContent = '🔊 浏览器朗读中';
            } else if (status === 'error') {
                btn.textContent = '⚠️ 请先添加音频';
            } else {
                btn.textContent = '🔊 ' + spot.title;
            }
        }

        function toggleAudio(spotIndex) {
            const spot = spots[spotIndex];
            if (!spot) return;
            
            let audioEl = document.getElementById('audio-' + spotIndex);
            if (!audioEl && spot.audioFile) {
                audioEl = document.createElement('audio');
                audioEl.id = 'audio-' + spotIndex;
                audioEl.src = spot.audioFile;
                audioEl.preload = 'auto';
                document.body.appendChild(audioEl);
            }
            
            const isCurrentPlaying = currentAudio && !currentAudio.paused && 
                                    currentAudio.id === 'audio-' + spotIndex;
            
            if (currentAudio && !currentAudio.paused) {
                currentAudio.pause();
                if (currentAudio.id !== 'audio-' + spotIndex) {
                    updateAudioBtn(currentAudio.id.replace('audio-', ''), '');
                }
            }
            
            if (isCurrentPlaying) {
                updateAudioBtn(spotIndex, '');
                return;
            }
            
            if (!spot.audioFile) {
                const usedTts = speakSpot(spotIndex);
                updateAudioBtn(spotIndex, usedTts ? 'speaking' : 'error');
                speechSynthesis.onend = () => {
                    updateAudioBtn(spotIndex, '');
                };
                return;
            }
            
            if (audioEl.paused) {
                audioEl.play().then(() => {
                    currentAudio = audioEl;
                    updateAudioBtn(spotIndex, 'playing');
                }).catch(() => {
                    const usedTts = speakSpot(spotIndex);
                    updateAudioBtn(spotIndex, usedTts ? 'speaking' : 'error');
                    speechSynthesis.onend = () => {
                        updateAudioBtn(spotIndex, '');
                    };
                });
            }
            
            audioEl.onended = () => {
                updateAudioBtn(spotIndex, '');
            };
        }

        function toggleMap() {
            const fullMap = document.getElementById('fullMap');
            fullMap.style.display = (fullMap.style.display === 'flex') ? 'none' : 'flex';
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.closePath();
        }

        function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
            const chars = Array.from(text);
            let line = '';
            let yy = y;
            for (const ch of chars) {
                const test = line + ch;
                if (ctx.measureText(test).width > maxWidth && line.length > 0) {
                    ctx.fillText(line, x, yy);
                    line = ch;
                    yy += lineHeight;
                } else {
                    line = test;
                }
            }
            ctx.fillText(line, x, yy);
            return yy;
        }

        function drawCardToCanvas(spotIndex) {
            const spot = spots[spotIndex];
            if (!spot) return;
            const canvas = document.getElementById('card-canvas-' + spotIndex);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;
            ctx.clearRect(0, 0, W, H);

            const grad = ctx.createLinearGradient(0, 0, W, H);
            grad.addColorStop(0, spot.color + 'dd');
            grad.addColorStop(1, spot.color + '88');
            ctx.fillStyle = grad;
            roundRect(ctx, 10, 10, W - 20, H - 20, 40);
            ctx.fill();
            ctx.lineWidth = 6;
            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            roundRect(ctx, 10, 10, W - 20, H - 20, 40);
            ctx.stroke();

            const font = '"Microsoft YaHei","PingFang SC","SimHei",sans-serif';

            ctx.textAlign = 'center';
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 56px ' + font;
            ctx.fillText(spot.emoji + ' ' + spot.title, W / 2, 100);

            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            roundRect(ctx, 40, 145, W - 80, 220, 24);
            ctx.fill();

            ctx.fillStyle = '#ffffff';
            ctx.font = '28px ' + font;
            ctx.textAlign = 'left';
            const descEndY = wrapText(ctx, spot.description, 70, 200, W - 140, 42);

            ctx.textAlign = 'center';
            ctx.font = 'italic 26px ' + font;
            ctx.fillStyle = '#fff59d';
            ctx.fillText(spot.funFact, W / 2, descEndY + 50);

            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            roundRect(ctx, 40, descEndY + 85, W - 80, 75, 16);
            ctx.fill();

            ctx.textAlign = 'left';
            ctx.font = '20px ' + font;
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.fillText('📍 推荐下一站', 70, descEndY + 118);
            ctx.font = 'bold 24px ' + font;
            ctx.fillStyle = '#ffffff';
            ctx.fillText(spot.nextSpotName, 70, descEndY + 148);
            ctx.font = '20px ' + font;
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.fillText(spot.nextSpotDirection, 70, descEndY + 178);

            const plane = document.getElementById('card-plane-' + spotIndex);
            if (plane && plane.getObject3D('mesh') && plane.getObject3D('mesh').material.map) {
                plane.getObject3D('mesh').material.map.needsUpdate = true;
            }
        }

        function updateAudioControls() {
            const container = document.getElementById('audioControls');
            container.innerHTML = '';
            if (foundSpots.size === 0) {
                container.style.display = 'none';
                return;
            }
            container.style.display = 'flex';
            foundSpots.forEach(idx => {
                const btn = document.createElement('button');
                btn.className = 'audioBtn';
                btn.id = 'audioBtn' + idx;
                btn.textContent = '🔊 ' + spots[idx].title;
                btn.onclick = () => toggleAudio(idx);
                container.appendChild(btn);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const sceneEl = document.querySelector('a-scene');
            const hint = document.getElementById('hint');
            
            for (let i = 0; i < spots.length; i++) {
                const canvas = document.createElement('canvas');
                canvas.id = 'card-canvas-' + i;
                canvas.width = 1024;
                canvas.height = 640;
                canvas.style.display = 'none';
                document.body.appendChild(canvas);

                drawCardToCanvas(i);

                const anchor = document.createElement('a-entity');
                anchor.setAttribute('id', 'target-' + i);
                anchor.setAttribute('mindar-image-target', 'targetIndex: ' + i);
                anchor.setAttribute('data-spot-index', i);

                const plane = document.createElement('a-plane');
                plane.setAttribute('id', 'card-plane-' + i);
                plane.setAttribute('position', '0 0 0');
                plane.setAttribute('width', '1.6');
                plane.setAttribute('height', '1.0');
                plane.setAttribute('material', 'src: #card-canvas-' + i + '; shader: flat; transparent: true');
                plane.setAttribute('visible', 'false');
                anchor.appendChild(plane);

                const particleContainer = document.createElement('a-entity');
                particleContainer.setAttribute('id', 'particle-container-' + i);
                particleContainer.setAttribute('position', '0 0 0.01');
                particleContainer.setAttribute('style', 'display: none;');
                particleContainer.innerHTML = `
                    <div style="position:absolute; width:100%; height:100%; pointer-events:none;">
                        <div class="particles-layer" style="top:50%; left:50%; width:0; height:0;">
                            <div class="particle orbit" style="animation-delay:0s; background:rgba(255,200,100,0.9);"></div>
                            <div class="particle orbit" style="animation-delay:0.5s; animation-duration:5s; background:rgba(150,200,255,0.9);"></div>
                            <div class="particle orbit" style="animation-delay:1s; animation-duration:3.5s; background:rgba(200,150,255,0.9);"></div>
                            <div class="particle orbit" style="animation-delay:1.5s; animation-duration:4.5s; background:rgba(150,255,200,0.9);"></div>
                            <div class="particle orbit" style="animation-delay:2s; animation-duration:4s; background:rgba(255,150,200,0.9);"></div>
                        </div>
                        <div class="particles-layer" style="top:0; left:0; width:100%; height:100%;">
                            <div class="particle float-border" style="top:0; left:10%; animation-delay:0s;"></div>
                            <div class="particle float-border" style="top:0; left:30%; animation-delay:0.3s;"></div>
                            <div class="particle float-border" style="top:0; left:50%; animation-delay:0.6s;"></div>
                            <div class="particle float-border" style="top:0; left:70%; animation-delay:0.9s;"></div>
                            <div class="particle float-border" style="top:0; left:90%; animation-delay:1.2s;"></div>
                            <div class="particle float-border" style="bottom:0; left:15%; animation-delay:0.2s;"></div>
                            <div class="particle float-border" style="bottom:0; left:40%; animation-delay:0.5s;"></div>
                            <div class="particle float-border" style="bottom:0; left:60%; animation-delay:0.8s;"></div>
                            <div class="particle float-border" style="bottom:0; left:85%; animation-delay:1.1s;"></div>
                            <div class="particle float-border" style="top:25%; left:0; animation-delay:0.4s;"></div>
                            <div class="particle float-border" style="top:50%; left:0; animation-delay:0.7s;"></div>
                            <div class="particle float-border" style="top:75%; left:0; animation-delay:1s;"></div>
                            <div class="particle float-border" style="top:20%; right:0; animation-delay:0.1s;"></div>
                            <div class="particle float-border" style="top:50%; right:0; animation-delay:0.4s;"></div>
                            <div class="particle float-border" style="top:80%; right:0; animation-delay:0.7s;"></div>
                            <div class="particle twinkle-edge" style="top:10%; left:25%; animation-delay:0s;"></div>
                            <div class="particle twinkle-edge" style="top:15%; left:75%; animation-delay:0.4s;"></div>
                            <div class="particle twinkle-edge" style="top:85%; left:20%; animation-delay:0.8s;"></div>
                            <div class="particle twinkle-edge" style="top:80%; left:80%; animation-delay:1.2s;"></div>
                            <div class="particle pulse-glow" style="top:5%; left:50%; animation-delay:0s;"></div>
                            <div class="particle pulse-glow" style="bottom:5%; left:50%; animation-delay:0.6s;"></div>
                            <div class="particle pulse-glow" style="top:50%; left:5%; animation-delay:1.2s;"></div>
                            <div class="particle pulse-glow" style="top:50%; right:5%; animation-delay:1.8s;"></div>
                        </div>
                    </div>
                `;
                anchor.appendChild(particleContainer);

                anchor.addEventListener('targetFound', function() {
                    const idx = parseInt(this.getAttribute('data-spot-index'));
                    const cardPlane = this.querySelector('a-plane');
                    if (cardPlane) cardPlane.setAttribute('visible', true);
                    const particles = document.getElementById('particle-container-' + idx);
                    if (particles) particles.style.display = '';
                    foundSpots.add(idx);
                    updateAudioControls();
                    hint.textContent = '✨ 发现：' + spots[idx].title;
                    hint.className = 'found';
                });

                anchor.addEventListener('targetLost', function() {
                    const idx = parseInt(this.getAttribute('data-spot-index'));
                    const cardPlane = this.querySelector('a-plane');
                    if (cardPlane) cardPlane.setAttribute('visible', false);
                    const particles = document.getElementById('particle-container-' + idx);
                    if (particles) particles.style.display = 'none';
                    foundSpots.delete(idx);
                    updateAudioControls();
                    if (foundSpots.size === 0) {
                        hint.textContent = '📷 请将摄像头对准识别图';
                        hint.className = '';
                    } else {
                        const lastIdx = Array.from(foundSpots)[foundSpots.size - 1];
                        hint.textContent = '✨ 发现：' + spots[lastIdx].title;
                    }
                });

                sceneEl.appendChild(anchor);
            }

            sceneEl.addEventListener('loaded', () => {
                for (let i = 0; i < spots.length; i++) {
                    drawCardToCanvas(i);
                }
            });
        });
    </script>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 7;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: true;"
    >
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    </a-scene>

    <div style="position:absolute; bottom:5px; right:10px; color:rgba(255,255,255,0.3); font-size:10px; z-index:5;">
        v1.0 | 智影校园 AR
    </div>
</body>
</html>
